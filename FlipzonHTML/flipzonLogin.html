<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Flipzon - Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="css/flipzonLogin.css" rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container d-flex justify-content-center align-items-center min-vh-100">

		<div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
			<div class="card-body">

				<h2 class="text-center mb-1 fw-bold text-primary">Flipzon</h2>
				<h5 class="text-center mb-4 text-muted">Welcome Back</h5>

				<form>
					<div class="mb-3">
						<label for="name" class="form-label fw-semibold">Username or Email</label>
						<input type="text" class="form-control" name="name" id="name" placeholder="Enter username">
					</div>

					<div class="mb-3">
						<label for="password" class="form-label fw-semibold">Password</label>
						<input type="password" class="form-control" name="pass" id="password"
							placeholder="Enter password">
					</div>

					<p class="text-danger small text-center mb-3 fw-bold" style="display: none;" id="errorMsg">
						Enter correct Username and password
					</p>

					<div class="d-grid gap-2 mt-4">
						<button onclick="login()" type="button" class="btn btn-primary btn-lg">Log In</button>

						<div class="text-center mt-1 mb-1 text-muted small">or</div>

						<a href="flipzonRegister.html" class="btn btn-outline-secondary">Create an account</a>
					</div>

				</form>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="scripts/flipzonLogin.js"></script>

</body>

</html>
