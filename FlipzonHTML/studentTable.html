<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Student Table</title>
	<link href="css/studentTable.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

	<h1 class="heading">Student Table</h1>

	<div class="container mt-5">
		<div class="row">
				
		<div class="col-5 enterDetails">

			<form>
				<div class="row">
					
					<div class="col">
						<label for="name">Name: </label>
					</div>
					<div class="col">
						<input type="text" name="name" value="" id="name">
					</div>

				<br><br>
				</div>

				<div class="row">

					<div class="col">
						<label for="name">Phone Number: </label>
					</div>
					<div class="col">
						<input type="tel" name="number" value="" id="number">
					<br><br>
					</div>
					
				</div>

				<div class="row">
					<div class="col">
						<label for="name">Email: </label>
					</div>

					<div class="col">
						<input type="email" name="mail" value="" id="mail">
					</div>
					
					<br><br>
				</div>


				<div class="row justify-content-end">
					<div class="col-5">
						<button class="p-2" type="button" onclick="handleSave()">Save</button>
					</div>
				</div>
			</form>

		</div>


		<div class="col displayDetails">


			<table class="table table-bordered table-hover" border="1" cellpadding='10' style="width: 100%;">
				<thead>
					<tr>
						<th style="width: 25%;">Name</th>
						<th style="width: 25%;">Phone Number</th>
						<th style="width: 25%;">Email</th>
						<th style="width: 25%;">Actions</th>
					</tr>
				</thead>

				<tbody id="tableBody">
					<tr>
					</tr>
				</tbody>
			</table>


		</div>

	</div>
</div>

</body>

<script src="scripts/studentTable.js"> </script>

</html>
