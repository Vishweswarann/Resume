<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Flipzon - Register</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="css/flipzonRegister.css" rel="stylesheet">
</head>

<body class="bg-light">

	<div class="container d-flex justify-content-center align-items-center min-vh-100 py-5">

		<div class="card shadow p-4" style="width: 100%; max-width: 550px; border-radius: 15px;">
			<div class="card-body">

				<h2 class="text-center mb-1 fw-bold text-primary">Flipzon</h2>
				<h5 class="text-center mb-4 text-muted">Create an Account</h5>

				<form>
					<div class="mb-3">
						<label for="name" class="form-label fw-semibold">Name</label>
						<input type="text" class="form-control" name="name" id="name">
						<p class="text-danger small mt-1 mb-0 fw-bold" style="display: none;" id="nameError">Enter name
							correctly</p>
					</div>

					<div class="mb-3">
						<label for="number" class="form-label fw-semibold">Phone Number</label>
						<input type="tel" class="form-control" name="number" id="number">
						<p class="text-danger small mt-1 mb-0 fw-bold" style="display: none;" id="numberError">Enter
							phone number correctly</p>
					</div>

					<div class="mb-3">
						<label for="dAddress" class="form-label fw-semibold">Delivery Address</label>
						<textarea class="form-control" rows="3" id="dAddress" ></textarea>
						<p class="text-danger small mt-1 mb-0 fw-bold" style="display: none;" id="dAddressError">Enter
							delivery address correctly</p>
					</div>

					<div class="mb-3">
						<label for="pAddress" class="form-label fw-semibold">Permanent Address</label>
						<textarea class="form-control" rows="3" id="pAddress"
							></textarea>
						<p class="text-danger small mt-1 mb-0 fw-bold" style="display: none;" id="pAddressError">Enter
							permanent Address correctly</p>
					</div>

					<div class="row">
						<div class="col-md-6 mb-3">
							<label for="pincode" class="form-label fw-semibold">Pincode</label>
							<input type="text" class="form-control" name="pincode" id="pincode"
								>
							<p class="text-danger small mt-1 mb-0 fw-bold" style="display: none;" id="pincodeError">
								Enter pincode correctly</p>
						</div>

						<div class="col-md-6 mb-3">
							<label for="password" class="form-label fw-semibold">Password</label>
							<input type="password" class="form-control" name="pass" id="password" >
							<p class="text-danger small mt-1 mb-0 fw-bold" style="display: none;" id="passwordError">
								Enter password correctly</p>
						</div>
					</div>

					<div class="d-grid gap-2 mt-4">
						<button onclick="register()" type="button" class="btn btn-primary btn-lg">Register</button>

						<div class="text-center mt-1 mb-1 text-muted small">or</div>

						<a href="flipzonLogin.html" class="btn btn-outline-secondary">Already have an account? Log
							in</a>
					</div>

				</form>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script src="scripts/flipzonRegister.js"></script>

</body>

</html>
