<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link href="css/flipzonRegister.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>


	<h3 class="heading">REGISTER</h3>

	<br><br><br>

	<div class="container">
		<form>

			<div class="row justify-content-center">
				<div class="col-4" style="width: 20%;">
					<label for="username">Name: </label>
				</div>
				<div class="col-4">
					<input type="text" name="name" value="" id="name">
				</div>
			</div>

			<div class="row justify-content-center mt-3">
					<div class="col-3">
						<p  style="display: none; color: red;" id="nameError">Enter name correctly </p>
					</div>
			</div>

			<div class="row justify-content-center mt-3">
				<div class="col-4" style="width: 20%;">
					<label for="username">Phone Number: </label>
				</div>
				<div class="col-4">
					<input type="tel" name="number" value="" id="number">
				</div>
			</div>


			<div class="row justify-content-center mt-3">
					<div class="col-4">
						<p  style="display: none; color: red;" id="numberError">Enter phone number correctly </p>
					</div>
				
			</div>

			<div class="row justify-content-center mt-3">
				<div class="col-4" style="width: 20%;">
					<label for="username">Delivery Address: </label>
				</div>
				<div class="col-4">
					<textarea rows="3" cols="22" id="dAddress"></textarea>
				</div>
			</div>

			<div class="row justify-content-center mt-3">
					<div class="col-4">
						<p  style="display: none; color: red;" id="dAddressError">Enter delivery address correctly </p>
					</div>
				
			</div>

			<div class="row justify-content-center mt-3">
				<div class="col-4" style="width: 20%;">
					<label for="username">Permanent Address: </label>
				</div>
				<div class="col-4">
					<textarea rows="3" cols="22" id="pAddress"></textarea>
				</div>
			</div>

			<div class="row justify-content-center mt-3">
					<div class="col-4">
						<p  style="display: none; color: red;" id="pAddressError">Enter permanent Address correctly </p>
					</div>
				
			</div>


			<div class="row justify-content-center mt-3">
				<div class="col-4" style="width: 20%;">
					<label for="username">Pincode: </label>
				</div>
				<div class="col-4">
					<input type="text" name="pincode" value="" id="pincode">
				</div>
			</div>

			<div class="row justify-content-center mt-3">
					<div class="col-4">
						<p  style="display: none; color: red;" id="pincodeError">Enter pincode correctly </p>
					</div>
				
			</div>


			<div class="row justify-content-center mt-3">
				<div class="col-4" style="width: 20%;">
					<label for="pass">Password: </label>
				</div>
				<div class="col-4">
					<input type="password" name="pass" value="" id="password">
				</div>
			</div>

			<div class="row justify-content-center mt-3">
					<div class="col-4">
						<p  style="display: none; color: red;" id="passwordError">Enter password correctly </p>
					</div>
				
			</div>



			<div class="row justify-content-center mt-5">
				<div class="col-4">
					<div class="row">
						<div class="col">
							<button onclick="register()" type="button" style="width: 100%;">Register</button>
						</div>
						<div class="col">
							<a href="flipzonLogin.html"><button type="button" style="width: 100%;">Already have an
									account?</button></a>
						</div>
					</div>
				</div>

			</div>
		</form>

	</div>

		<script src="scripts/flipzonRegister.js">
			
		</script>
</body>

</html>
